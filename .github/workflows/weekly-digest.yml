name: Boomi Weekly Digest

on:
  schedule:
    # Tous les mardi à 9h00 heure de Paris (7h00 UTC en hiver, 6h00 UTC en été)
    # GitHub Actions ne gère pas le fuseau horaire local : ajustez si besoin.
    - cron: "0 9 * * 2"
  workflow_dispatch: {}   

permissions:
  contents: write   # nécessaire pour committer le fichier data/seen_items.json mis à jour

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Exécuter la veille
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-flash-lite-latest
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python src/main.py

      - name: Committer l'historique mis à jour
        run: |
          git config user.name "boomi-watch-bot"
          git config user.email "actions@github.com"
          git add data/seen_items.json
          git diff --staged --quiet || git commit -m "chore: update seen_items.json [skip ci]"
          git push
