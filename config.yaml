# ============================================================
# Boomi Watch - Configuration des sources
# ============================================================

# Aucun flux RSS officiel utilisé actuellement.
rss_feeds: []

# ============================================================
# 1. Boomi Community
# ============================================================
# Chaque carte est traitée comme un item.
# Le lien et le titre sont récupérés depuis <a class="card-link">.

scrape_pages:
  - name: "Boomi Community"
    type: "cards"
    url: "https://community.boomi.com/boomi_community"
    render_js: true
    wait_selector: "div.card.ng-scope"

    item_selector: "div.card.ng-scope"
    title_selector: "h3.card-title.ng-binding"
    description_selector: "p.card-excerpt.ng-binding"
    link_selector: "a.card-link"

    # Le titre et le lien sont directement portés par a.card-link.
    title_from_item_text: false
    link_from_item_href: false

    apply_keyword_filter: false

    base_url: "https://community.boomi.com"

    max_items: 20


# ============================================================
# 2. Boomi Product Updates - Latest Product Releases
# ============================================================
# Seuls les éléments de la section Latest Product Releases
# présents dans les div.rc-item sont collectés.

  - name: "Boomi Product Updates - Latest Product Releases"
    type: "cards"
    url: "https://boomi.com/product-updates/"

    item_selector: "div.rc-item"

    # Titre de la publication.
    title_selector: "h2.tc-title"

    # Description à l'intérieur du bloc rc-desc.
    description_selector: "div.rc-desc p"

    # Lien vers l'article complet.
    link_selector: "a[href]"

    base_url: "https://boomi.com"

    allowed_url_patterns:
      - "/blog/"

    apply_keyword_filter: false

    excluded_url_patterns:
      - "#"
      # - "/platform/"
      # - "/connectors/"
      # - "/compliance/"
      # - "/content/"
      # - "/company/"
      # - "/form/"

    max_items: 10


# ============================================================
# 3. Boomi Documentation - Release Notes mensuelles
# ============================================================
# {year} et {month} doivent être remplacés automatiquement
# par l'année et le mois courants dans collect.py.
#
# Exemple en juillet 2026 :
# https://help.boomi.com/docs/Atomsphere/Release_Notes/Platform
# ?year=2026&month=July

content_pages:
  - name: "Boomi Platform Release Notes"
    type: "monthly_release_notes"
    topic: "Platform"

    url_template: "https://help.boomi.com/docs/Atomsphere/Release_Notes/Platform?year={year}&month={month}"

    render_js: true
    wait_selector: "div.release-content-wrapper"

    content_selector: "div.release-content-wrapper"
    title_selector: "div.release-page h1"
    bullet_selector: "div.release-content-wrapper ul > li"

    excluded_selectors:
      - "nav"
      - "header"
      - "footer"
      - "script"
      - "style"
      - "form"
      - "div.new-badge-wrapper"

    summarize_with_llm: true
    summary_max_lines: 3
    include_source_link: true


