# ============================================================
# Paramètres d'extraction
# ============================================================

collection:
  request_timeout_seconds: 30
  max_description_characters: 6000
  max_content_characters_per_page: 15000
  remove_duplicate_urls: true
  remove_empty_items: true

  user_agent: "BoomiWatch/1.0"

  # Les mois doivent être générés en anglais pour les URL Boomi :
  # January, February, March, April, May, June,
  # July, August, September, October, November, December.
  month_language: "english"

  # Empêche l'envoi au LLM d'une page sans aucune release.
  require_bullet_items_for_release_notes: true


# ============================================================
# Résumé LLM
# ============================================================

llm_summary:
  enabled: true
  language: "fr"
  max_lines: 3

  instructions: |
    Résume les nouveautés Boomi en français en trois lignes maximum.
    Mentionne uniquement les fonctionnalités, améliorations,
    changements de sécurité, dépréciations et breaking changes importants.
    Ne crée aucune information absente du contenu source.
    Ne répète pas le titre.
    Le lien vers la source sera ajouté séparément par l'application.


# ============================================================
# Filtrage
# ============================================================

# Le filtrage concerne principalement Boomi Community.
# Les Release Notes officielles ne doivent pas être supprimées
# uniquement parce qu'elles ne contiennent pas ces mots-clés.

keep_keywords:
  - "release"
  - "update"
  - "what's new"
  - "platform"
  - "integration"
  - "runtime"
  - "connector"
  - "connectivity"
  - "API"
  - "security"
  - "AI"
  - "agent"
  - "data hub"
  - "event streams"
  - "deprecation"
  - "deprecated"


# ============================================================
# Catégories du digest
# ============================================================

categories:
  - "Nouveau connecteur"
  - "Fonctionnalité IA / Agent"
  - "Sécurité"
  - "Dépréciation / Breaking change"
  - "API Management"
  - "Runtime"
  - "Intégration"
  - "Data Hub"
  - "Event Streams"
  - "Amélioration générale"
  - "Autre"